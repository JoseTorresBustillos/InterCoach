spring.application.name=codecoach

spring.datasource.url=jdbc:postgresql://localhost:5432/codecoach
spring.datasource.username=codecoach
spring.datasource.password=codecoach

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# OpenAI API key loaded from environment variable
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Model used for AI feedback
spring.ai.openai.chat.options.model=gpt-4.1-mini
